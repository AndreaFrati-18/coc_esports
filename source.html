<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoC Esports – Disponibilità</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --text: #e8eaf0;
      --muted: #7b80a0;
      --green: #22c97a;
      --green-bg: #0d2e1e;
      --green-border: #1a5c3a;
      --red: #f05a5a;
      --red-bg: #2e1212;
      --red-border: #5c1a1a;
      --gray-slot: #22263a;
      --accent: #5b6af0;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── AUTH ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .auth-logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .auth-logo-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .auth-logo-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 3px;
      margin-bottom: 1.5rem;
    }

    .auth-tab {
      flex: 1;
      padding: 6px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      border: none;
      background: transparent;
      font-family: inherit;
    }

    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 500;
      border: 1px solid var(--border);
    }

    .form-group { margin-bottom: 12px; }

    .form-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      color: var(--red);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    /* ── APP ── */
    #app-screen { display: none; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px 4px 6px;
      font-size: 13px;
    }

    .user-avatar {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover { color: var(--text); border-color: var(--muted); }

    .main-nav {
      display: flex;
      gap: 4px;
      padding: 1rem 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .nav-tab {
      padding: 8px 16px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }

    .nav-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
      font-weight: 500;
    }

    .page { display: none; padding: 1.5rem; }
    .page.active { display: block; }

    /* ── GRIGLIA ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .state-bar {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .state-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      background: var(--surface2);
      color: var(--muted);
      transition: all 0.15s;
    }

    .state-btn.active-green {
      background: var(--green-bg);
      border-color: var(--green-border);
      color: var(--green);
      font-weight: 500;
    }

    .state-btn.active-red {
      background: var(--red-bg);
      border-color: var(--red-border);
      color: var(--red);
      font-weight: 500;
    }

    .state-btn.active-gray {
      background: var(--surface);
      border-color: var(--muted);
      color: var(--text);
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .dot-gray { background: var(--muted); }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .week-label {
      font-size: 14px;
      font-weight: 500;
      min-width: 190px;
      text-align: center;
    }

    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .icon-btn:hover { color: var(--text); }

    .grid-wrapper { overflow-x: auto; }

    .avail-grid {
      display: grid;
      gap: 2px;
      min-width: max-content;
      grid-template-columns: 52px repeat(7, 44px);
    }

    .shared-grid {
      display: grid;
      gap: 2px;
      min-width: max-content;
      grid-template-columns: 52px repeat(7, 44px);
    }

    .col-hdr {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 2px 0 6px;
      line-height: 1.4;
      white-space: pre-line;
    }

    .col-hdr.today { color: var(--green); font-weight: 500; }

    .row-lbl {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 6px;
      height: 28px;
    }

    .slot {
      height: 28px;
      width: 44px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--gray-slot);
      transition: opacity 0.1s;
      user-select: none;
      position: relative;
    }

    .slot:hover { opacity: 0.75; }
    .slot.ci-sono { background: #1a5c3a; border-color: var(--green-border); }
    .slot.non-ci-sono { background: #5c1a1a; border-color: var(--red-border); }

    /* shared grid */
    .sslot {
      height: 28px;
      width: 44px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--gray-slot);
      position: relative;
      cursor: default;
    }

    .sslot.quorum { background: #1a5c3a; border-color: var(--green-border); }

    .sslot .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
      min-width: 100px;
    }

    .sslot:hover .tooltip { display: block; }

    .count-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      pointer-events: none;
    }

    .sslot.quorum .count-badge { color: var(--green); }

    .legend {
      display: flex;
      gap: 16px;
      margin-top: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    /* ── REGOLE ── */
    .settings-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-top: 1.5rem;
    }

    .settings-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .rule-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .rule-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .day-chips { display: flex; gap: 4px; }

    .day-chip {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      cursor: pointer;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }

    .day-chip.sel-green { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }
    .day-chip.sel-red { background: var(--red); border-color: var(--red); color: #fff; font-weight: 600; }

    .rule-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .rule-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 6px;
      font-size: 12px;
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .rule-select:focus { border-color: var(--accent); }

    .btn-del {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .btn-del:hover { color: var(--red); }

    .btn-add-rule {
      font-size: 12px;
      color: var(--green);
      border: 1px dashed var(--green-border);
      background: transparent;
      border-radius: var(--radius);
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .btn-add-rule:hover { background: var(--green-bg); }

    /* ── PROFILO ── */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      max-width: 420px;
    }

    .profile-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .profile-row:last-child { border-bottom: none; }
    .profile-key { font-size: 12px; color: var(--muted); }
    .profile-val { font-size: 14px; font-weight: 500; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text);
      transition: transform 0.25s ease;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── LOADING ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .saving-indicator {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚔️</div>
      <div>
        <div class="auth-logo-text">CoC Esports</div>
        <div class="auth-logo-sub">Gestione disponibilità</div>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Accedi</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Registrati</button>
    </div>

    <div id="auth-error" class="auth-error"></div>

    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="tua@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" />
      </div>
      <button class="btn-primary" onclick="doLogin()">Accedi</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="tua@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Nickname</label>
        <input type="text" id="reg-nickname" class="form-input" placeholder="Il tuo nickname" />
      </div>
      <div class="form-group">
        <label class="form-label">Tag CoC</label>
        <input type="text" id="reg-tag" class="form-input" placeholder="#ABC123" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="reg-password" class="form-input" placeholder="••••••••" />
      </div>
      <button class="btn-primary" onclick="doRegister()">Registrati</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">⚔️</div>
      <span class="topbar-title">CoC Esports</span>
    </div>
    <div class="topbar-right">
      <div class="saving-indicator" id="saving-indicator" style="display:none">
        <div class="spinner"></div> Salvataggio…
      </div>
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-nickname">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Esci</button>
    </div>
  </div>

  <div class="main-nav">
    <button class="nav-tab active" onclick="switchPage('my-avail')">Le mie disponibilità</button>
    <button class="nav-tab" onclick="switchPage('shared')">Vista condivisa</button>
    <button class="nav-tab" onclick="switchPage('profile')">Profilo</button>
  </div>

  <!-- PAGE: LE MIE DISPONIBILITÀ -->
  <div class="page active" id="page-my-avail">
    <div class="page-header">
      <div class="state-bar">
        <span style="font-size:12px; color:var(--muted); margin-right:2px">Stato attivo:</span>
        <button class="state-btn active-green" id="sbtn-ci-sono" onclick="setActiveState('ci-sono')">
          <span class="dot dot-green"></span> Ci sono
        </button>
        <button class="state-btn" id="sbtn-non-ci-sono" onclick="setActiveState('non-ci-sono')">
          <span class="dot dot-red"></span> Non ci sono
        </button>
        <button class="state-btn" id="sbtn-non-so" onclick="setActiveState('non-so')">
          <span class="dot dot-gray"></span> Non so
        </button>
      </div>
    </div>

    <div class="week-nav">
      <button class="icon-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-label" id="week-label">—</span>
      <button class="icon-btn" onclick="shiftWeek(1)">›</button>
    </div>

    <div class="grid-wrapper">
      <div class="avail-grid" id="avail-grid"></div>
    </div>

    <div class="legend">
      <span class="legend-item">
        <span class="legend-swatch" style="background:#1a5c3a; border:1px solid var(--green-border)"></span> Ci sono
      </span>
      <span class="legend-item">
        <span class="legend-swatch" style="background:#5c1a1a; border:1px solid var(--red-border)"></span> Non ci sono
      </span>
      <span class="legend-item">
        <span class="legend-swatch" style="background:var(--gray-slot); border:1px solid var(--border)"></span> Non so
      </span>
      <span style="margin-left:auto; font-size:12px; color:var(--muted)">Clicca o trascina</span>
    </div>

    <div class="settings-section">
      <div class="settings-title">↻ Orari fissi ricorrenti</div>
      <div id="rules-container"></div>
      <button class="btn-add-rule" onclick="addRule()">+ Aggiungi regola</button>
    </div>
  </div>

  <!-- PAGE: VISTA CONDIVISA -->
  <div class="page" id="page-shared">
    <div class="week-nav">
      <button class="icon-btn" onclick="shiftWeekShared(-1)">‹</button>
      <span class="week-label" id="shared-week-label">—</span>
      <button class="icon-btn" onclick="shiftWeekShared(1)">›</button>
    </div>

    <div class="grid-wrapper">
      <div class="shared-grid" id="shared-grid"></div>
    </div>

    <div class="legend">
      <span class="legend-item">
        <span class="legend-swatch" style="background:#1a5c3a; border:1px solid var(--green-border)"></span> ≥ 5 giocatori disponibili
      </span>
      <span class="legend-item">
        <span class="legend-swatch" style="background:var(--gray-slot); border:1px solid var(--border)"></span> Meno di 5
      </span>
      <span style="margin-left:auto; font-size:12px; color:var(--muted)">Passa il mouse per vedere chi c'è</span>
    </div>
  </div>

  <!-- PAGE: PROFILO -->
  <div class="page" id="page-profile">
    <div class="profile-card">
      <div class="profile-row">
        <span class="profile-key">Nickname</span>
        <span class="profile-val" id="profile-nickname">—</span>
      </div>
      <div class="profile-row">
        <span class="profile-key">Tag CoC</span>
        <span class="profile-val" id="profile-tag">—</span>
      </div>
      <div class="profile-row">
        <span class="profile-key">Email</span>
        <span class="profile-val" id="profile-email">—</span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACtShPziRhBkczl5LKjeLCdkwE9-r3KiE",
  authDomain: "coc-esports-9487b.firebaseapp.com",
  projectId: "coc-esports-9487b",
  storageBucket: "coc-esports-9487b.firebasestorage.app",
  messagingSenderId: "816587273789",
  appId: "1:816587273789:web:acebe321d88dba33d71c54"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── COSTANTI ──
const DAYS_IT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const MONTHS_IT = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
const DAYS_CHIPS = ['L','M','M','G','V','S','D'];
const TIMES = [];
for(let h = 12; h < 26; h++){
  const hh = h < 24 ? h : h - 24;
  TIMES.push(`${String(hh).padStart(2,'0')}:00`);
}
const QUORUM = 5;

// ── STATO ──
let currentUser = null;
let userProfile = null;
let slotData = {};
let rules = [];
let weekOffset = 0;
let sharedWeekOffset = 0;
let activeState = 'ci-sono';
let isDragging = false;
let dragState = null;
let saveTimer = null;
let allUsersData = {};
let sharedUnsub = null;

// ── AUTH UI ──
window.switchAuthTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab==='login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
  document.getElementById('auth-error').style.display = 'none';
};

function showAuthError(msg){
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-password').value;
  if(!email || !pwd){ showAuthError('Compila tutti i campi.'); return; }
  try {
    await setPersistence(auth, browserLocalPersistence);
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch(e) {
    showAuthError('Email o password errati.');
  }
};

window.doRegister = async () => {
  const email = document.getElementById('reg-email').value.trim();
  const nickname = document.getElementById('reg-nickname').value.trim();
  const tag = document.getElementById('reg-tag').value.trim();
  const pwd = document.getElementById('reg-password').value;
  if(!email || !nickname || !tag || !pwd){ showAuthError('Compila tutti i campi.'); return; }
  if(pwd.length < 6){ showAuthError('La password deve avere almeno 6 caratteri.'); return; }
  try {
    await setPersistence(auth, browserLocalPersistence);
    const cred = await createUserWithEmailAndPassword(auth, email, pwd);
    await setDoc(doc(db, 'users', cred.user.uid), { nickname, tag, email });
  } catch(e) {
    if(e.code === 'auth/email-already-in-use') showAuthError('Email già registrata.');
    else showAuthError('Errore durante la registrazione.');
  }
};

window.doLogout = async () => {
  await signOut(auth);
};

// ── AUTH STATE ──
onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    userProfile = snap.exists() ? snap.data() : { nickname: user.email, tag: '', email: user.email };
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-nickname').textContent = userProfile.nickname;
    document.getElementById('user-avatar').textContent = userProfile.nickname.charAt(0).toUpperCase();
    document.getElementById('profile-nickname').textContent = userProfile.nickname;
    document.getElementById('profile-tag').textContent = userProfile.tag;
    document.getElementById('profile-email').textContent = userProfile.email;
    await loadUserData();
    renderGrid();
    renderRules();
    subscribeShared();
  } else {
    currentUser = null;
    userProfile = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    if(sharedUnsub) sharedUnsub();
  }
});

// ── LOAD / SAVE USER DATA ──
async function loadUserData(){
  const snap = await getDoc(doc(db, 'availability', currentUser.uid));
  if(snap.exists()){
    const data = snap.data();
    slotData = data.slots || {};
    rules = data.rules || [];
  } else {
    slotData = {};
    rules = [];
  }
}

function scheduleSave(){
  document.getElementById('saving-indicator').style.display = 'flex';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await setDoc(doc(db, 'availability', currentUser.uid), {
      slots: slotData,
      rules: rules,
      nickname: userProfile.nickname,
      uid: currentUser.uid
    });
    document.getElementById('saving-indicator').style.display = 'none';
    showToast('Disponibilità salvata');
  }, 1200);
}

// ── TOAST ──
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── NAVIGATION ──
window.switchPage = (id) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id === 'shared') renderSharedGrid();
};

// ── DATE HELPERS ──
function dateKey(d){ return d.toISOString().slice(0,10); }

function getWeekDays(offset){
  const now = new Date();
  const day = now.getDay();
  const diff = day===0 ? -6 : 1-day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset*7);
  mon.setHours(0,0,0,0);
  return Array.from({length:7}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function weekLabel(days){
  const s = days[0], e = days[6];
  return `${DAYS_IT[0]} ${s.getDate()} – ${DAYS_IT[6]} ${e.getDate()} ${MONTHS_IT[e.getMonth()]}`;
}

// ── RULES APPLICATION ──
function applyRules(){
  const allDays = [];
  for(let w = -2; w <= 8; w++) getWeekDays(w).forEach(d => allDays.push(d));
  rules.forEach(rule => {
    allDays.forEach((d, _) => {
      const di = (d.getDay() + 6) % 7;
      if(!rule.days.includes(di)) return;
      const ds = dateKey(d);
      const fromIdx = TIMES.indexOf(rule.from);
      const toIdx = TIMES.indexOf(rule.to);
      if(fromIdx < 0 || toIdx < 0) return;
      for(let i = fromIdx; i <= toIdx; i++){
        const k = ds+'_'+TIMES[i];
        if(!slotData[k]) slotData[k] = rule.state === 'non-so' ? undefined : rule.state;
      }
    });
  });
}

// ── MY GRID ──
window.setActiveState = (s) => {
  activeState = s;
  ['ci-sono','non-ci-sono','non-so'].forEach(st => {
    const b = document.getElementById('sbtn-'+st);
    b.className = 'state-btn';
    if(st === s){
      if(s==='ci-sono') b.classList.add('active-green');
      else if(s==='non-ci-sono') b.classList.add('active-red');
      else b.classList.add('active-gray');
    }
  });
};

window.shiftWeek = (d) => { weekOffset += d; renderGrid(); };

function applySlotEl(slot){
  const ds = slot.dataset.date, t = slot.dataset.time;
  if(dragState === 'non-so') delete slotData[ds+'_'+t];
  else slotData[ds+'_'+t] = dragState;
  slot.className = 'slot' + (dragState==='ci-sono' ? ' ci-sono' : dragState==='non-ci-sono' ? ' non-ci-sono' : '');
  scheduleSave();
}

function makeSlot(dateStr, timeStr){
  const state = slotData[dateStr+'_'+timeStr] || 'non-so';
  const slot = document.createElement('div');
  slot.className = 'slot' + (state==='ci-sono' ? ' ci-sono' : state==='non-ci-sono' ? ' non-ci-sono' : '');
  slot.dataset.date = dateStr;
  slot.dataset.time = timeStr;
  slot.addEventListener('mousedown', e => { e.preventDefault(); isDragging=true; dragState=activeState; applySlotEl(slot); });
  slot.addEventListener('mouseenter', () => { if(isDragging) applySlotEl(slot); });
  slot.addEventListener('touchstart', e => { e.preventDefault(); isDragging=true; dragState=activeState; applySlotEl(slot); }, {passive:false});
  slot.addEventListener('touchmove', e => {
    if(!isDragging) return;
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if(el && el.classList.contains('slot')) applySlotEl(el);
  }, {passive:false});
  return slot;
}

function renderGrid(){
  applyRules();
  const grid = document.getElementById('avail-grid');
  grid.innerHTML = '';
  const days = getWeekDays(weekOffset);
  const todayStr = dateKey(new Date());
  document.getElementById('week-label').textContent = weekLabel(days);

  grid.appendChild(document.createElement('div'));
  days.forEach((d,i) => {
    const ds = dateKey(d);
    const el = document.createElement('div');
    el.className = 'col-hdr' + (ds===todayStr ? ' today' : '');
    el.style.whiteSpace = 'pre-line';
    el.textContent = `${DAYS_IT[i]}\n${d.getDate()}`;
    grid.appendChild(el);
  });

  TIMES.forEach(t => {
    const lbl = document.createElement('div');
    lbl.className = 'row-lbl';
    lbl.textContent = t;
    grid.appendChild(lbl);
    days.forEach(d => grid.appendChild(makeSlot(dateKey(d), t)));
  });
}

document.addEventListener('mouseup', () => isDragging = false);
document.addEventListener('touchend', () => isDragging = false);

// ── SHARED GRID ──
function subscribeShared(){
  const q = query(collection(db, 'availability'));
  sharedUnsub = onSnapshot(q, snap => {
    allUsersData = {};
    snap.forEach(d => { allUsersData[d.id] = d.data(); });
    if(document.getElementById('page-shared').classList.contains('active')) renderSharedGrid();
  });
}

window.shiftWeekShared = (d) => { sharedWeekOffset += d; renderSharedGrid(); };

function renderSharedGrid(){
  const grid = document.getElementById('shared-grid');
  grid.innerHTML = '';
  const days = getWeekDays(sharedWeekOffset);
  const todayStr = dateKey(new Date());
  document.getElementById('shared-week-label').textContent = weekLabel(days);

  grid.appendChild(document.createElement('div'));
  days.forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'col-hdr' + (dateKey(d)===todayStr ? ' today' : '');
    el.style.whiteSpace = 'pre-line';
    el.textContent = `${DAYS_IT[i]}\n${d.getDate()}`;
    grid.appendChild(el);
  });

  TIMES.forEach(t => {
    const lbl = document.createElement('div');
    lbl.className = 'row-lbl';
    lbl.textContent = t;
    grid.appendChild(lbl);

    days.forEach(d => {
      const ds = dateKey(d);
      const key = ds+'_'+t;
      const presentUsers = [];
      Object.values(allUsersData).forEach(u => {
        if(u.slots && u.slots[key] === 'ci-sono') presentUsers.push(u.nickname || '?');
      });
      const count = presentUsers.length;
      const slot = document.createElement('div');
      slot.className = 'sslot' + (count >= QUORUM ? ' quorum' : '');

      if(count > 0){
        const badge = document.createElement('div');
        badge.className = 'count-badge';
        badge.textContent = count;
        slot.appendChild(badge);

        const tip = document.createElement('div');
        tip.className = 'tooltip';
        tip.textContent = presentUsers.join(', ');
        slot.appendChild(tip);
      }
      grid.appendChild(slot);
    });
  });
}

// ── RULES UI ──
window.addRule = () => {
  rules.push({ days:[], from:'18:00', to:'22:00', state:'ci-sono' });
  renderRules();
};

function renderRules(){
  const c = document.getElementById('rules-container');
  c.innerHTML = '';
  rules.forEach((rule, ri) => {
    const card = document.createElement('div');
    card.className = 'rule-card';

    const top = document.createElement('div');
    top.className = 'rule-top';
    const chips = document.createElement('div');
    chips.className = 'day-chips';
    DAYS_CHIPS.forEach((d,di) => {
      const ch = document.createElement('button');
      const isSel = rule.days.includes(di);
      const cls = isSel ? (rule.state==='non-ci-sono' ? ' sel-red' : ' sel-green') : '';
      ch.className = 'day-chip' + cls;
      ch.textContent = d;
      ch.onclick = () => {
        const idx = rule.days.indexOf(di);
        if(idx>=0) rule.days.splice(idx,1); else rule.days.push(di);
        renderRules(); applyRules(); renderGrid(); scheduleSave();
      };
      chips.appendChild(ch);
    });

    const del = document.createElement('button');
    del.className = 'btn-del';
    del.innerHTML = '🗑';
    del.title = 'Elimina regola';
    del.onclick = () => { rules.splice(ri,1); renderRules(); applyRules(); renderGrid(); scheduleSave(); };

    top.appendChild(chips);
    top.appendChild(del);

    const bot = document.createElement('div');
    bot.className = 'rule-bottom';

    const mkSel = (opts, val, onChange) => {
      const s = document.createElement('select');
      s.className = 'rule-select';
      opts.forEach(([v,l]) => {
        const o = document.createElement('option');
        o.value=v; o.textContent=l;
        if(v===val) o.selected=true;
        s.appendChild(o);
      });
      s.onchange = () => { onChange(s.value); renderRules(); applyRules(); renderGrid(); scheduleSave(); };
      return s;
    };

    const timeOpts = TIMES.map(t => [t,t]);
    const stateOpts = [['ci-sono','Ci sono'],['non-ci-sono','Non ci sono'],['non-so','Non so']];

    bot.appendChild(Object.assign(document.createElement('span'), {textContent:'Dalle '}));
    bot.appendChild(mkSel(timeOpts, rule.from, v => rule.from=v));
    bot.appendChild(Object.assign(document.createElement('span'), {textContent:' alle '}));
    bot.appendChild(mkSel(timeOpts, rule.to, v => rule.to=v));
    bot.appendChild(Object.assign(document.createElement('span'), {textContent:' → '}));
    bot.appendChild(mkSel(stateOpts, rule.state, v => rule.state=v));

    card.appendChild(top);
    card.appendChild(bot);
    c.appendChild(card);
  });
}
